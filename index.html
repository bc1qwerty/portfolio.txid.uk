<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>BTC Portfolio | txid.uk</title>
<meta name="description" content="비트코인 멀티 주소 포트폴리오 트래커">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="base.css"><link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
<header><div class="header-inner">
  <a href="https://txid.uk" class="logo">portfolio.txid.uk</a>
  <nav>
    <a href="https://txid.uk">탐색기</a>
    <a href="https://stats.txid.uk">Stats</a>
    <a href="#" class="active">Portfolio</a>
  </nav>
  <button id="theme-btn" onclick="toggleTheme()">🌙</button>
</div></header>

<main>
  <div class="hero">
    <h1>BTC <span class="accent">Portfolio</span></h1>
    <p class="hero-sub">여러 주소의 잔액을 한눈에 — 로컬 저장, 서버 전송 없음</p>
  </div>

  <div class="content">
    <div class="add-row">
      <input id="addr-input" class="input" placeholder="Bitcoin 주소 추가 (bc1, 1, 3...)" spellcheck="false">
      <input id="addr-label" class="input label-input" placeholder="이름 (선택)" spellcheck="false">
      <button class="btn" onclick="addAddress()">추가</button>
    </div>

    <div id="portfolio-summary" class="portfolio-summary" style="display:none">
      <div class="summary-card"><div class="sum-val" id="total-btc">0</div><div class="sum-lbl">총 BTC</div></div>
      <div class="summary-card"><div class="sum-val" id="total-krw">—</div><div class="sum-lbl">원화 환산</div></div>
      <div class="summary-card"><div class="sum-val" id="total-usd">—</div><div class="sum-lbl">달러 환산</div></div>
      <div class="summary-card"><div class="sum-val" id="addr-count">0</div><div class="sum-lbl">주소 수</div></div>
    </div>

    <div id="addr-list" class="addr-list"></div>

    <div class="action-row">
      <button class="btn secondary" onclick="refreshAll()">🔄 전체 새로고침</button>
      <button class="btn secondary" onclick="exportData()">📤 내보내기</button>
      <button class="btn secondary" onclick="importData()">📥 가져오기</button>
      <button class="btn danger" onclick="clearAll()">🗑 전체 삭제</button>
    </div>
  </div>
</main>

<footer><div class="footer-inner"><span>© 2025 txid.uk — 모든 데이터는 브라우저에만 저장됩니다</span><span>mempool.space API</span></div></footer>
<script src="app.js"></script>
</body></html>
